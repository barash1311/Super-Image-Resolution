<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid SR Image Enhancer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            transition: border-color 0.3s;
        }
        .upload-section:hover {
            border-color: #3498db;
        }
        #imageInput {
            display: none;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .results {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .image-box {
            text-align: center;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
        }
        .image-box h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .image-box img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            cursor: crosshair;
        }
        .download-link {
            display: none;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .download-link:hover {
            text-decoration: underline;
        }
        .status-badge {
            background: #f39c12;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #3498db;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Hybrid SR Image Enhancer</h1>
        
        <div style="text-align: center;">
            <div class="status-badge" id="modelStatus">Status: Untrained Model (Results will improve after training)</div>
        </div>

        <div class="upload-section" id="dropZone">
            <p>Select or drag a blurry image to enhance</p>
            <input type="file" id="imageInput" accept="image/*">
            <button class="btn" onclick="document.getElementById('imageInput').click()">Choose Image</button>
            <button class="btn" id="enhanceBtn" disabled onclick="enhanceImage()">Enhance Image</button>
        </div>

        <div id="loading" class="loading">🚀 Processing... Our Hybrid Transformer is thinking...</div>
        <div id="error" class="error"></div>

        <div class="results">
            <div class="image-box">
                <h3>Original (Blurry)</h3>
                <img id="originalPreview" src="" alt="">
            </div>
            <div class="image-box">
                <h3>Enhanced (Super-Res)</h3>
                <img id="enhancedPreview" src="" alt="">
                <a id="downloadBtn" class="download-link" href="#" download="enhanced.png">💾 Download Result</a>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const enhanceBtn = document.getElementById('enhanceBtn');
        const originalPreview = document.getElementById('originalPreview');
        const enhancedPreview = document.getElementById('enhancedPreview');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        imageInput.onchange = function() {
            const file = imageInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalPreview.src = e.target.result;
                    enhanceBtn.disabled = false;
                    enhancedPreview.src = ""; // Clear previous results
                }
                reader.readAsDataURL(file);
                errorDiv.style.display = 'none';
            }
        };

        async function enhanceImage() {
            const file = imageInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            enhanceBtn.disabled = true;
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            enhancedPreview.src = "";
            document.getElementById('downloadBtn').style.display = 'none';

            try {
                const response = await fetch('/enhance', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    const base64Img = "data:image/png;base64," + data.enhanced_image;
                    enhancedPreview.src = base64Img;
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.href = base64Img;
                    downloadBtn.style.display = 'inline-block';
                } else {
                    errorDiv.textContent = "Error: " + (data.error || "Failed to process image");
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = "Error: Could not connect to server";
                errorDiv.style.display = 'block';
                console.error(err);
            } finally {
                loading.style.display = 'none';
                enhanceBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
