train:
  hr_dir: "datasets/DIV2K"
  batch_size: 8
  patch_size: 192
  num_workers: 4
  lr: 0.0001
  epochs: 800
  upscale: 4
  save_dir: "experiments/hybrid_sr_v1"

model:
  nf: 64
  gc: 32
  n_rrdb: 6
  transformer_depth: 2
  transformer_heads: 8

loss_weights:
  l1: 1.0
  perceptual: 1.0
  tv: 0.0001
  lab: 0.1
  laplacian: 0.5

val:
  hr_dir: "datasets/Set14"
  val_freq: 5
